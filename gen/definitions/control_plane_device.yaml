---
name: Control Plane Device
rest_endpoint: /dna/intent/api/v1/business/sda/control-plane-device
res_description: Manages the addition and deletion of control plane devices within an SDA Fabric
id_from_attribute: true
id_query_param: deviceManagementIpAddress
delete_id_query_param: deviceManagementIpAddress
no_update: true
doc_category: SDA
test_tags: [SDA]
attributes:
  - model_name: deviceManagementIpAddress
    requires_replace: true
    mandatory: true
    id: true
    description: Management Ip Address of the Device which is provisioned successfully
    type: String
    example: 192.168.10.1
  - model_name: siteNameHierarchy
    requires_replace: true
    type: String
    mandatory: true
    description: siteNameHierarchy of the Provisioned Device(site should be part of Fabric Site)
    example: Global/Area1
    test_value: '"${catalystcenter_area.test.parent_name}/${catalystcenter_area.test.name}"'
  - model_name: routeDistributionProtocol
    requires_replace: true
    type: String
    enum_values: [LISP_BGP, LISP_PUB_SUB]
    default_value: LISP_BGP
    description: Route Distribution Protocol for Control Plane Device
    example: LISP_BGP
test_prerequisites: |
  resource "catalystcenter_area" "test" {
    name        = "Area1"
    parent_name = "Global"
  }
  resource "catalystcenter_fabric_site" "test" {
    site_id                     = catalystcenter_area.test.id
    pub_sub_enabled             = false
    authentication_profile_name = "No Authentication"
    depends_on = [catalystcenter_area.test]
  }